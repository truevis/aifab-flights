<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Link Generator</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .custom-underline {
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen">

  <header class="bg-slate-900 text-white border-b border-slate-800 shadow-sm py-5 px-6">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Flight Link Generator</h1>
        <p class="text-slate-400 text-sm mt-1">Generate dynamic deep-links across top metasearch engines for any global route.</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="resetToBOSBKK()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-semibold rounded-md border border-slate-700 transition">
          Reset to BOS ➔ BKK
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

      <section class="lg:col-span-1 bg-white p-6 rounded-xl border border-gray-200 shadow-sm h-fit">
        <form id="generatorForm" onsubmit="event.preventDefault(); generateTable();" class="space-y-5">
          <div>
            <div class="rounded-md border border-gray-300 bg-gray-50 px-3 py-2.5 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 focus-within:bg-white transition">
              <div class="flex items-center justify-between gap-2">
                <label for="fromAirport" class="text-xs font-bold text-gray-700 uppercase tracking-wider">Departure Airport</label>
                <input type="text" id="fromAirport" value="BOS" maxlength="3" required
                  class="w-14 px-1 py-0.5 border border-gray-300 rounded uppercase font-semibold text-center text-lg tracking-widest bg-white focus:outline-none focus:ring-1 focus:ring-blue-500">
              </div>
              <p id="fromAirportLocation" class="mt-1.5 text-xs text-gray-600 leading-snug"></p>
            </div>
          </div>

          <div>
            <div class="rounded-md border border-gray-300 bg-gray-50 px-3 py-2.5 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 focus-within:bg-white transition">
              <div class="flex items-center justify-between gap-2">
                <label for="toAirport" class="text-xs font-bold text-gray-700 uppercase tracking-wider">Destination Airport</label>
                <input type="text" id="toAirport" value="BKK" maxlength="3" required
                  class="w-14 px-1 py-0.5 border border-gray-300 rounded uppercase font-semibold text-center text-lg tracking-widest bg-white focus:outline-none focus:ring-1 focus:ring-blue-500">
              </div>
              <p id="toAirportLocation" class="mt-1.5 text-xs text-gray-600 leading-snug"></p>
            </div>
          </div>

          <div>
            <label for="startDate" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Starting Date</label>
            <input type="date" id="startDate" required
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-900 bg-gray-50 focus:bg-white transition">
          </div>

          <div>
            <label for="durationDays" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Date Range Duration</label>
            <select id="durationDays"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-gray-50">
              <option value="3">3 Days</option>
              <option value="7" selected>7 Days (Weekly Spread)</option>
              <option value="14">14 Days (Two Weeks)</option>
              <option value="30">30 Days (Full Month)</option>
              <option value="31">31 Days (Optimized Spread)</option>
            </select>
          </div>

          <button type="submit"
            class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            Generate Dynamic Table
          </button>
        </form>

        <div class="mt-6 pt-5 border-t border-gray-100" id="popularRoutes"></div>
      </section>

      <section class="lg:col-span-3">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

          <div class="bg-slate-50 border-b border-gray-200 px-6 py-2.5 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
            <div class="flex items-center gap-3">
              <span id="badgeFrom" class="px-2.5 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded-full tracking-wider">BOS</span>
              <span class="text-gray-400 font-semibold">➔</span>
              <span id="badgeTo" class="px-2.5 py-1 bg-emerald-100 text-emerald-800 text-xs font-bold rounded-full tracking-wider">BKK</span>
              <span class="text-sm text-gray-500 font-medium">One-Way Flights Only</span>
            </div>
            <div class="text-xs text-gray-500 font-medium">
              Showing dates: <span id="textDateRange" class="font-semibold text-gray-700">Loading...</span>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-left text-[13px] leading-snug">
              <thead class="bg-slate-50">
                <tr>
                  <th scope="col" class="px-4 py-2 font-semibold text-gray-700 border-b border-gray-200">Departure Date</th>
                  <th scope="col" class="px-3 py-2 font-semibold text-gray-700 border-b border-gray-200 text-center">Open All</th>
                  <th scope="col" class="px-4 py-2 font-semibold text-gray-700 border-b border-gray-200">
                    <button type="button"
                      data-col-open="google"
                      onclick="openAllColumnLinks(this)"
                      class="mb-1.5 px-2.5 py-0.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded shadow-sm transition focus:outline-none focus:ring-2 focus:ring-emerald-500">
                      Open All
                    </button>
                    <span class="block font-semibold">Google Flights Live Search Link</span>
                  </th>
                  <th scope="col" class="px-4 py-2 font-semibold text-gray-700 border-b border-gray-200">
                    <button type="button"
                      data-col-open="kayak"
                      onclick="openAllColumnLinks(this)"
                      class="mb-1.5 px-2.5 py-0.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded shadow-sm transition focus:outline-none focus:ring-2 focus:ring-emerald-500">
                      Open All
                    </button>
                    <span class="block font-semibold">Kayak Live Search Link</span>
                  </th>
                  <th scope="col" class="px-4 py-2 font-semibold text-gray-700 border-b border-gray-200">
                    <button type="button"
                      data-col-open="skyscanner"
                      onclick="openAllColumnLinks(this)"
                      class="mb-1.5 px-2.5 py-0.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded shadow-sm transition focus:outline-none focus:ring-2 focus:ring-emerald-500">
                      Open All
                    </button>
                    <span class="block font-semibold">Skyscanner Live Search Link</span>
                  </th>
                  <th scope="col" class="px-4 py-2 font-semibold text-gray-700 border-b border-gray-200">
                    <button type="button"
                      data-col-open="expedia"
                      onclick="openAllColumnLinks(this)"
                      class="mb-1.5 px-2.5 py-0.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded shadow-sm transition focus:outline-none focus:ring-2 focus:ring-emerald-500">
                      Open All
                    </button>
                    <span class="block font-semibold">Expedia Live Search Link</span>
                  </th>
                </tr>
              </thead>
              <tbody id="flightsTableBody" class="bg-white divide-y divide-gray-100">
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const AIRPORTS = {

      ORD: { name: "O'Hare International Airport", city: 'Chicago', country: 'United States' },
      DFW: { name: 'Dallas/Fort Worth International Airport', city: 'Dallas', country: 'United States' },
      ATL: { name: 'Hartsfield-Jackson Atlanta International Airport', city: 'Atlanta', country: 'United States' },
      MIA: { name: 'Miami International Airport', city: 'Miami', country: 'United States' },
      SEA: { name: 'Seattle-Tacoma International Airport', city: 'Seattle', country: 'United States' },
      DEN: { name: 'Denver International Airport', city: 'Denver', country: 'United States' },
      LAS: { name: 'Harry Reid International Airport', city: 'Las Vegas', country: 'United States' },
      PHX: { name: 'Phoenix Sky Harbor International Airport', city: 'Phoenix', country: 'United States' },
      IAH: { name: 'George Bush Intercontinental Airport', city: 'Houston', country: 'United States' },
      IAD: { name: 'Washington Dulles International Airport', city: 'Washington, D.C.', country: 'United States' },
      DCA: { name: 'Ronald Reagan Washington National Airport', city: 'Washington, D.C.', country: 'United States' },
      PHL: { name: 'Philadelphia International Airport', city: 'Philadelphia', country: 'United States' },
      MCO: { name: 'Orlando International Airport', city: 'Orlando', country: 'United States' },
      HNL: { name: 'Daniel K. Inouye International Airport', city: 'Honolulu', country: 'United States' },
      WAW: { name: 'Warsaw Chopin Airport', city: 'Warsaw', country: 'Poland' },
      PRG: { name: 'Václav Havel Airport Prague', city: 'Prague', country: 'Czech Republic' },
      BUD: { name: 'Budapest Ferenc Liszt International Airport', city: 'Budapest', country: 'Hungary' },
      OTP: { name: 'Henri Coandă International Airport', city: 'Bucharest', country: 'Romania' },
      SOF: { name: 'Sofia Airport', city: 'Sofia', country: 'Bulgaria' },

      ATH: { name: 'Athens International Airport', city: 'Athens', country: 'Greece' },

      NRT: { name: 'Narita International Airport', city: 'Tokyo', country: 'Japan' },
      HND: { name: 'Tokyo Haneda Airport', city: 'Tokyo', country: 'Japan' },
      ICN: { name: 'Incheon International Airport', city: 'Seoul', country: 'South Korea' },
      PEK: { name: 'Beijing Capital International Airport', city: 'Beijing', country: 'China' },
      PVG: { name: 'Shanghai Pudong International Airport', city: 'Shanghai', country: 'China' },
      HKG: { name: 'Hong Kong International Airport', city: 'Hong Kong', country: 'Hong Kong SAR' },
      TPE: { name: 'Taiwan Taoyuan International Airport', city: 'Taipei', country: 'Taiwan' },
      DEL: { name: 'Indira Gandhi International Airport', city: 'New Delhi', country: 'India' },
      BOM: { name: 'Chhatrapati Shivaji Maharaj International Airport', city: 'Mumbai', country: 'India' },
      BKK: { name: 'Suvarnabhumi Airport', city: 'Bangkok', country: 'Thailand' },
      DMK: { name: 'Don Mueang International Airport', city: 'Bangkok', country: 'Thailand' },
      DAD: { name: 'Da Nang International Airport', city: 'Da Nang', country: 'Vietnam' },
      HKT: { name: 'Phuket International Airport', city: 'Phuket', country: 'Thailand' },
      USM: { name: 'Samui Airport', city: 'Koh Samui', country: 'Thailand' },
      SIN: { name: 'Singapore Changi Airport', city: 'Singapore', country: 'Singapore' },
      KUL: { name: 'Kuala Lumpur International Airport', city: 'Kuala Lumpur', country: 'Malaysia' },
      SGN: { name: 'Tan Son Nhat International Airport', city: 'Ho Chi Minh City', country: 'Vietnam' },
      HAN: { name: 'Noi Bai International Airport', city: 'Hanoi', country: 'Vietnam' },
      MNL: { name: 'Ninoy Aquino International Airport', city: 'Manila', country: 'Philippines' },
      CEB: { name: 'Mactan-Cebu International Airport', city: 'Cebu', country: 'Philippines' },
      CGK: { name: 'Soekarno-Hatta International Airport', city: 'Jakarta', country: 'Indonesia' },
      DPS: { name: 'Ngurah Rai International Airport', city: 'Denpasar (Bali)', country: 'Indonesia' },
      PNH: { name: 'Phnom Penh International Airport', city: 'Phnom Penh', country: 'Cambodia' },
      RGN: { name: 'Yangon International Airport', city: 'Yangon', country: 'Myanmar' },
      VTE: { name: 'Wattay International Airport', city: 'Vientiane', country: 'Laos' },
    };

    const POPULAR_ROUTE_GROUPS = [
      {
        label: 'North America',
        destinations: ['SFO', 'LAX', 'JFK', 'ORD', 'MIA', 'SEA', 'DEN', 'LAS', 'ATL', 'HNL'],
      },
      {
        label: 'Eastern Europe',
        destinations: ['WAW', 'PRG', 'BUD', 'OTP', 'SOF', 'BEG', 'ATH', 'RIX', 'TLL', 'VNO'],
      },
      {
        label: 'East Asia',
        destinations: ['NRT', 'HND', 'ICN', 'PEK', 'PVG', 'HKG', 'TPE', 'DEL', 'BOM'],
      },
      {
        label: 'Southeast Asia',
        destinations: ['BKK', 'DMK', 'DAD', 'HKT', 'USM', 'SIN', 'KUL', 'SGN', 'HAN', 'MNL', 'CEB', 'CGK', 'DPS', 'PNH', 'RGN', 'VTE'],
      },
    ];

    function isValidIataCode(code) {
      return /^[A-Z]{3}$/.test(code);
    }

    function airportLocationLabel(code) {
      if (!code) return '';
      const airport = AIRPORTS[code];
      if (airport) {
        return `${airport.name} — ${airport.city}, ${airport.country}`;
      }
      return '';
    }

    function updateAirportLocationLabels() {
      const from = document.getElementById('fromAirport').value.trim().toUpperCase();
      const to = document.getElementById('toAirport').value.trim().toUpperCase();
      const fromEl = document.getElementById('fromAirportLocation');
      const toEl = document.getElementById('toAirportLocation');

      fromEl.textContent = airportLocationLabel(from);
      toEl.textContent = airportLocationLabel(to);

      const fromKnown = !!AIRPORTS[from];
      const toKnown = !!AIRPORTS[to];
      fromEl.classList.toggle('text-gray-600', fromKnown || isValidIataCode(from));
      toEl.classList.toggle('text-gray-600', toKnown || isValidIataCode(to));
    }

    function airportTooltip(code) {
      const airport = AIRPORTS[code];
      if (!airport) return code;
      return `${airport.name} — ${airport.city}, ${airport.country}`;
    }

    function routeTooltip(from, to) {
      return `${airportTooltip(from)} → ${airportTooltip(to)}`;
    }

    function getCurrentOrigin() {
      return document.getElementById('fromAirport').value.trim().toUpperCase() || 'BOS';
    }

    function updatePopularRoutes() {
      updateAirportLocationLabels();
      renderPopularRoutes();
    }

    function renderPopularRoutes() {
      const container = document.getElementById('popularRoutes');
      const from = getCurrentOrigin();
      const buttonClass = 'px-2 py-1 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs rounded transition font-medium';

      container.innerHTML = '';

      const label = document.createElement('span');
      label.className = 'block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3';
      label.textContent = `Popular Routes from ${from}`;
      container.appendChild(label);

      POPULAR_ROUTE_GROUPS.forEach((group, index) => {
        const heading = document.createElement('span');
        heading.className = `block text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2${index === 0 ? ' mt-1' : ''}`;
        heading.textContent = group.label;
        container.appendChild(heading);

        const groupEl = document.createElement('div');
        groupEl.className = `flex flex-wrap gap-2${index < POPULAR_ROUTE_GROUPS.length - 1 ? ' mb-4' : ''}`;

        group.destinations.forEach((to) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = buttonClass;
          button.textContent = `${from} ➔ ${to}`;
          button.title = routeTooltip(from, to);
          button.addEventListener('click', () => setQuickRoute(getCurrentOrigin(), to));
          groupEl.appendChild(button);
        });

        container.appendChild(groupEl);
      });
    }

    function bindFormListeners() {
      const fromAirportEl = document.getElementById('fromAirport');
      const toAirportEl = document.getElementById('toAirport');
      const startDateEl = document.getElementById('startDate');
      const durationDaysEl = document.getElementById('durationDays');

      fromAirportEl.addEventListener('input', () => {
        fromAirportEl.value = fromAirportEl.value.toUpperCase();
        updatePopularRoutes();
        if (isValidIataCode(fromAirportEl.value.trim())) {
          maybeGenerateTable();
        }
      });
      fromAirportEl.addEventListener('change', () => {
        updatePopularRoutes();
        maybeGenerateTable();
      });

      toAirportEl.addEventListener('input', () => {
        toAirportEl.value = toAirportEl.value.toUpperCase();
        updateAirportLocationLabels();
        if (isValidIataCode(toAirportEl.value.trim())) {
          maybeGenerateTable();
        }
      });
      toAirportEl.addEventListener('change', () => {
        updateAirportLocationLabels();
        maybeGenerateTable();
      });

      startDateEl.addEventListener('change', maybeGenerateTable);
      durationDaysEl.addEventListener('change', maybeGenerateTable);
    }

    window.addEventListener('load', () => {
      const today = getTodayIsoDate();
      const startDateEl = document.getElementById('startDate');
      startDateEl.min = today;
      startDateEl.value = today;
      bindFormListeners();
      generateTable();
    });

    window.addEventListener('pageshow', updatePopularRoutes);

    function openAllSearchLinks(urls) {
      urls.forEach((url) => window.open(url, '_blank', 'noopener,noreferrer'));
    }

    function getFormState() {
      const fromAirport = document.getElementById('fromAirport').value.trim().toUpperCase();
      const toAirport = document.getElementById('toAirport').value.trim().toUpperCase();
      let startDateStr = document.getElementById('startDate').value;
      const durationDays = parseInt(document.getElementById('durationDays').value, 10);
      const today = getTodayIsoDate();

      if (startDateStr && startDateStr < today) {
        startDateStr = today;
        document.getElementById('startDate').value = today;
      }

      return { fromAirport, toAirport, startDateStr, durationDays };
    }

    function buildProviderUrl(provider, fromAirport, toAirport, isoDate) {
      switch (provider) {
        case 'google':
          return buildGoogleFlightsUrl(fromAirport, toAirport, isoDate);
        case 'kayak':
          return buildKayakUrl(fromAirport, toAirport, isoDate);
        case 'skyscanner':
          return buildSkyscannerUrl(fromAirport, toAirport, isoDate);
        case 'expedia':
          return buildExpediaUrl(fromAirport, toAirport, isoDate);
        default:
          return null;
      }
    }

    function buildDateRangeUrls(provider, state) {
      const { fromAirport, toAirport, startDateStr, durationDays } = state;
      if (!startDateStr || !isValidIataCode(fromAirport) || !isValidIataCode(toAirport)) {
        return [];
      }

      const startDate = new Date(startDateStr + 'T00:00:00');
      const urls = [];
      for (let i = 0; i < durationDays; i++) {
        const currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + i);
        const url = buildProviderUrl(provider, fromAirport, toAirport, formatIsoDate(currentDate));
        if (url) urls.push(url);
      }
      return urls;
    }

    function openAllColumnLinks(button) {
      const provider = button?.dataset.colOpen;
      if (!provider) return;
      // Rebuild from live form state so opened tabs always match the current UI.
      generateTable();
      const urls = buildDateRangeUrls(provider, getFormState());
      if (urls.length) openAllSearchLinks(urls);
    }

    function escapeHtmlAttr(value) {
      return value.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    function formatIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getTodayIsoDate() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return formatIsoDate(today);
    }

    function maybeGenerateTable() {
      const from = document.getElementById('fromAirport').value.trim().toUpperCase();
      const to = document.getElementById('toAirport').value.trim().toUpperCase();
      const startDate = document.getElementById('startDate').value;
      if (isValidIataCode(from) && isValidIataCode(to) && startDate) {
        generateTable();
      }
    }

    function concatBytes(chunks) {
      const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const chunk of chunks) {
        out.set(chunk, offset);
        offset += chunk.length;
      }
      return out;
    }

    function writeVarint(value) {
      const bytes = [];
      let n = value;
      while (n > 127) {
        bytes.push((n & 0x7f) | 0x80);
        n >>>= 7;
      }
      bytes.push(n & 0x7f);
      return Uint8Array.from(bytes);
    }

    function writeTag(field, wireType) {
      return writeVarint((field << 3) | wireType);
    }

    function writeVarintField(field, value) {
      return concatBytes([writeTag(field, 0), writeVarint(value)]);
    }

    function writeStringField(field, value) {
      const encoded = new TextEncoder().encode(value);
      return concatBytes([writeTag(field, 2), writeVarint(encoded.length), encoded]);
    }

    function writeMessageField(field, messageBytes) {
      return concatBytes([writeTag(field, 2), writeVarint(messageBytes.length), messageBytes]);
    }

    function writeAirport(code) {
      return concatBytes([writeVarintField(1, 1), writeStringField(2, code)]);
    }

    function writeFlightLeg(departDate, origin, destination) {
      return concatBytes([
        writeStringField(2, departDate),
        writeMessageField(13, writeAirport(origin)),
        writeMessageField(14, writeAirport(destination)),
      ]);
    }

    function buildGoogleFlightsTfs(origin, destination, departDate) {
      const payload = concatBytes([
        writeVarintField(2, 0),
        writeMessageField(3, writeFlightLeg(departDate, origin, destination)),
        writeVarintField(8, 1),
        writeVarintField(9, 1),
        writeVarintField(19, 2),
      ]);
      return btoa(String.fromCharCode(...payload))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    function buildGoogleFlightsUrl(fromAirport, toAirport, isoDate) {
      const tfs = buildGoogleFlightsTfs(fromAirport, toAirport, isoDate);
      return `https://www.google.com/travel/flights/search?tfs=${tfs}&curr=USD&hl=en`;
    }

    function buildKayakUrl(fromAirport, toAirport, isoDate) {
      return `https://www.kayak.com/flights/${fromAirport}-${toAirport}/${isoDate}?sort=price_a`;
    }

    function buildSkyscannerUrl(fromAirport, toAirport, isoDate) {
      const origin = fromAirport.toLowerCase();
      const destination = toAirport.toLowerCase();
      const yy = isoDate.slice(2, 4);
      const mm = isoDate.slice(5, 7);
      const dd = isoDate.slice(8, 10);
      const yymmdd = `${yy}${mm}${dd}`;
      const oym = `${yy}${mm}`;
      const selectedDay = String(parseInt(dd, 10));
      const params = new URLSearchParams({
        adultsv2: '1',
        cabinclass: 'economy',
        childrenv2: '',
        rtn: '0',
        preferdirects: 'false',
        oym,
        selectedoday: selectedDay,
      });
      return `https://www.skyscanner.com/transport/flights/${origin}/${destination}/${yymmdd}/?${params.toString()}`;
    }

    function buildExpediaUrl(fromAirport, toAirport, isoDate) {
      const params = new URLSearchParams({
        load: '1',
        FromAirport: fromAirport,
        ToAirport: toAirport,
        NumAdult: '1',
      });
      return `https://www.expedia.com/go/flight/search/oneway/${isoDate}/${isoDate}?${params.toString()}`;
    }

    function generateTable() {
      updatePopularRoutes();
      const { fromAirport, toAirport, startDateStr, durationDays } = getFormState();

      if (!startDateStr || !isValidIataCode(fromAirport) || !isValidIataCode(toAirport)) return;

      const startDate = new Date(startDateStr + 'T00:00:00');
      const tableBody = document.getElementById('flightsTableBody');
      tableBody.innerHTML = '';

      document.getElementById('badgeFrom').textContent = fromAirport;
      document.getElementById('badgeTo').textContent = toAirport;

      let lastDateFormatted = '';

      for (let i = 0; i < durationDays; i++) {
        const currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + i);

        const isoDate = formatIsoDate(currentDate);
        const dayOfWeek = currentDate.toLocaleDateString('en-US', { weekday: 'long' });
        const displayDate = currentDate.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });

        if (i === durationDays - 1) {
          lastDateFormatted = isoDate;
        }

        const googleFlightsUrl = buildGoogleFlightsUrl(fromAirport, toAirport, isoDate);
        const kayakUrl = buildKayakUrl(fromAirport, toAirport, isoDate);
        const skyscannerUrl = buildSkyscannerUrl(fromAirport, toAirport, isoDate);
        const expediaUrl = buildExpediaUrl(fromAirport, toAirport, isoDate);

        const searchUrls = [googleFlightsUrl, kayakUrl, skyscannerUrl, expediaUrl];

        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-50/50 transition';
        row.innerHTML = `
          <td class="px-4 py-1.5 whitespace-nowrap">
            <span class="font-medium text-gray-900">${displayDate}</span>
            <span class="text-gray-500"> · ${dayOfWeek}</span>
          </td>
          <td class="px-3 py-1 whitespace-nowrap text-center">
            <button type="button"
              data-urls="${escapeHtmlAttr(JSON.stringify(searchUrls))}"
              onclick="openAllSearchLinks(JSON.parse(this.dataset.urls))"
              class="px-2.5 py-0.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded shadow-sm transition focus:outline-none focus:ring-2 focus:ring-indigo-500">
              Open All
            </button>
          </td>
          <td class="px-4 py-1.5 whitespace-nowrap">
            <a href="${escapeHtmlAttr(googleFlightsUrl)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 custom-underline font-medium">Google Flights</a>
          </td>
          <td class="px-4 py-1.5 whitespace-nowrap">
            <a href="${escapeHtmlAttr(kayakUrl)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 custom-underline font-medium">Kayak</a>
          </td>
          <td class="px-4 py-1.5 whitespace-nowrap">
            <a href="${escapeHtmlAttr(skyscannerUrl)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 custom-underline font-medium">Skyscanner</a>
          </td>
          <td class="px-4 py-1.5 whitespace-nowrap">
            <a href="${escapeHtmlAttr(expediaUrl)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 custom-underline font-medium">Expedia</a>
          </td>
        `;
        tableBody.appendChild(row);
      }

      document.getElementById('textDateRange').textContent = `${startDateStr} to ${lastDateFormatted}`;
    }

    function resetToBOSBKK() {
      document.getElementById('fromAirport').value = 'BOS';
      document.getElementById('toAirport').value = 'BKK';
      document.getElementById('startDate').value = getTodayIsoDate();
      document.getElementById('durationDays').value = '7';
      generateTable();
    }

    function setQuickRoute(from, to) {
      document.getElementById('fromAirport').value = from;
      document.getElementById('toAirport').value = to;
      generateTable();
    }
  </script>
</body>
</html>
